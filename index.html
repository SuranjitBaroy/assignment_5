<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen font-sans">

    <section id="login-page" class="flex items-center justify-center min-h-screen px-4">
        <div class="card w-full max-w-md bg-white shadow-xl border p-8 text-center">
            <div class="flex justify-center mb-4">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub Logo" class="w-16">
            </div>
            <h1 class="text-2xl font-bold text-slate-800">GitHub Issues Tracker</h1>
            <p class="text-sm text-slate-500 mb-8">Sign in to manage your issues</p>
            
            <div class="space-y-4 text-left">
                <div class="form-control">
                    <label class="label font-semibold text-slate-700">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full" />
                </div>
                <div class="form-control">
                    <label class="label font-semibold text-slate-700">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full" />
                </div>
            </div>

            <button onclick="handleLogin()" class="btn btn-primary mt-8 w-full bg-indigo-600 hover:bg-indigo-700 border-none text-white">Sign In</button>
            
            <div class="mt-8 p-4 bg-slate-50 rounded-lg border border-dashed border-slate-300">
                <p class="text-xs font-bold text-slate-600 mb-1 underline">Demo Credentials</p>
                <p class="text-xs text-slate-500">Username: <span class="text-indigo-600">admin</span></p>
                <p class="text-xs text-slate-500">Password: <span class="text-indigo-600">admin123</span></p>
            </div>
        </div>
    </section>

    <section id="main-page" class="hidden">
        <nav class="navbar bg-white border-b px-4 lg:px-20 sticky top-0 z-50">
            <div class="flex-1">
                <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                    <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-8" alt="Logo">
                    <span class="font-bold text-lg hidden md:block">GitHub Issues Tracker</span>
                </div>
            </div>
            <div class="flex-none gap-4">
                <div class="join">
                    <input type="text" id="search-input" placeholder="Search issues..." class="input input-bordered input-sm join-item w-32 md:w-64" onkeyup="handleSearch(this.value)" />
                    <button class="btn btn-sm join-item bg-indigo-600 text-white border-none">Search</button>
                </div>
                <button class="btn btn-sm bg-indigo-600 text-white border-none">+ New Issue</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 lg:p-10">
            <div class="flex justify-center lg:justify-start mb-8">
                <div class="inline-flex bg-white border rounded-lg p-1 shadow-sm">
                    <button onclick="filterIssues('all', this)" class="tab-btn px-6 py-2 rounded-md text-sm font-medium transition-all bg-indigo-600 text-white active-tab">All</button>
                    <button onclick="filterIssues('open', this)" class="tab-btn px-6 py-2 rounded-md text-sm font-medium transition-all text-slate-600 hover:bg-slate-50">Open</button>
                    <button onclick="filterIssues('closed', this)" class="tab-btn px-6 py-2 rounded-md text-sm font-medium transition-all text-slate-600 hover:bg-slate-50">Closed</button>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center mb-8 p-6 bg-white rounded-xl border border-slate-200 shadow-sm gap-4">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-indigo-50 rounded-xl">
                        <img src="https://cdn-icons-png.flaticon.com/512/10329/10329894.png" class="w-8" alt="Icon">
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-slate-800"><span id="count-display">0</span> Issues</h2>
                        <p class="text-xs text-slate-400">Track and manage project progress</p>
                    </div>
                </div>
                <div class="flex gap-6">
                    <div class="flex items-center gap-2 text-xs font-bold text-green-600 bg-green-50 px-3 py-1 rounded-full border border-green-100">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span> Open
                    </div>
                    <div class="flex items-center gap-2 text-xs font-bold text-purple-600 bg-purple-50 px-3 py-1 rounded-full border border-purple-100">
                        <span class="w-2 h-2 rounded-full bg-purple-500"></span> Closed
                    </div>
                </div>
            </div>

            <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </main>
    </section>

    <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box max-w-3xl border-t-8 border-indigo-600 p-0 overflow-hidden">
            <div id="modal-content" class="p-8">
                </div>
            <div class="modal-action p-6 bg-slate-50 border-t">
                <form method="dialog">
                    <button class="btn bg-indigo-600 text-white border-none px-12">Close</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script src="app.js"></script>
</body>
</html>
